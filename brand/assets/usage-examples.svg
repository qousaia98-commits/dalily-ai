<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img" aria-label="Dalily logo usage examples">
  <rect width="1200" height="720" fill="#F7F8FA"/>
  <text x="48" y="48" fill="#0B1526" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Logo Usage</text>

  <!-- Light background -->
  <rect x="48" y="88" width="520" height="240" rx="20" fill="#FFFFFF" stroke="#E4E7EE"/>
  <text x="68" y="116" fill="#8A93A8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">ON LIGHT</text>
  <g transform="translate(88, 150)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#0B1526" d="M12 12.2A3.2 3.2 0 0 1 15.2 9h5.1c10.8 0 14.2 14.8 11.2 29.1H15.2A3.2 3.2 0 0 1 12 34.9V12.2Zm12.4 11.8a5.4 5.4 0 1 0-10.8 0 5.4 5.4 0 0 0 10.8 0Z"/>
    <circle cx="26.6" cy="24" r="2.1" fill="#C4A052"/>
  </g>
  <text x="148" y="182" fill="#0B1526" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="28" font-weight="700">Dalily</text>
  <text x="148" y="208" fill="#5C6478" font-family="'Noto Sans Arabic', Tahoma, sans-serif" font-size="14">/DJDJ</text>

  <!-- Dark background -->
  <rect x="600" y="88" width="520" height="240" rx="20" fill="#0B1526"/>
  <text x="620" y="116" fill="#8A93A8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">ON DARK</text>
  <g transform="translate(640, 150)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#FFFFFF" d="M12 12.2A3.2 3.2 0 0 1 15.2 9h5.1c10.8 0 14.2 14.8 11.2 29.1H15.2A3.2 3.2 0 0 1 12 34.9V12.2Zm12.4 11.8a5.4 5.4 0 1 0-10.8 0 5.4 5.4 0 0 0 10.8 0Z"/>
    <circle cx="26.6" cy="24" r="2.1" fill="#D4B76A"/>
  </g>
  <text x="700" y="182" fill="#FFFFFF" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="28" font-weight="700">Dalily</text>
  <text x="700" y="208" fill="#C8CED9" font-family="'Noto Sans Arabic', Tahoma, sans-serif" font-size="14">/DJDJ</text>

  <!-- App icon row -->
  <rect x="48" y="360" width="520" height="300" rx="20" fill="#FFFFFF" stroke="#E4E7EE"/>
  <text x="68" y="388" fill="#8A93A8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">APP ICON SIZES</text>
  <rect x="88" y="420" width="128" height="128" rx="28" fill="#0B1526"/>
  <g transform="translate(112, 444) scale(2)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#FFFFFF" d="M12 12.2A3.2 3.2 0 0 1 15.2 9h5.1c10.8 0 14.2 14.8 11.2 29.1H15.2A3.2 3.2 0 0 1 12 34.9V12.2Zm12.4 11.8a5.4 5.4 0 1 0-10.8 0 5.4 5.4 0 0 0 10.8 0Z"/>
    <circle cx="26.6" cy="24" r="2.1" fill="#C4A052"/>
  </g>
  <rect x="240" y="468" width="64" height="64" rx="14" fill="#0B1526"/>
  <g transform="translate(252, 480) scale(1)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#FFFFFF" d="M12 12.2A3.2 3.2 0 0 1 15.2 9h5.1c10.8 0 14.2 14.8 11.2 29.1H15.2A3.2 3.2 0 0 1 12 34.9V12.2Zm12.4 11.8a5.4 5.4 0 1 0-10.8 0 5.4 5.4 0 0 0 10.8 0Z"/>
    <circle cx="26.6" cy="24" r="2.1" fill="#C4A052"/>
  </g>
  <rect x="328" y="484" width="32" height="32" rx="7" fill="#0B1526"/>
  <g transform="translate(332, 488) scale(0.5)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#FFFFFF" d="M12 12.2A3.2 3.2 0 0 1 15.2 9h5.1c10.8 0 14.2 14.8 11.2 29.1H15.2A3.2 3.2 0 0 1 12 34.9V12.2Zm12.4 11.8a5.4 5.4 0 1 0-10.8 0 5.4 5.4 0 0 0 10.8 0Z"/>
    <circle cx="26.6" cy="24" r="2.1" fill="#C4A052"/>
  </g>
  <text x="88" y="590" fill="#5C6478" font-family="system-ui, sans-serif" font-size="13">512 · 64 · 32 · 16  symbol only, no text</text>

  <!-- Don'ts -->
  <rect x="600" y="360" width="520" height="300" rx="20" fill="#FFFFFF" stroke="#E4E7EE"/>
  <text x="620" y="388" fill="#8A93A8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">DO NOT</text>
  <text x="620" y="430" fill="#0B1526" font-family="system-ui, sans-serif" font-size="14"> No gradients, shadows, or 3D effects</text>
  <text x="620" y="458" fill="#0B1526" font-family="system-ui, sans-serif" font-size="14"> No location pins or map clichés</text>
  <text x="620" y="486" fill="#0B1526" font-family="system-ui, sans-serif" font-size="14"> Do not stretch, rotate, or recolor the mark</text>
  <text x="620" y="514" fill="#0B1526" font-family="system-ui, sans-serif" font-size="14"> Do not place on busy photography without contrast</text>
  <text x="620" y="542" fill="#0B1526" font-family="system-ui, sans-serif" font-size="14"> Do not separate gold focal point from the D mark</text>
</svg>
